# ============================================================================
# Lokalny stack Grimshade Backend — identyczny u każdego.
#   web (nginx :8080)  →  app (PHP-FPM)  →  db (lokalny Postgres :5432)
#
# LOKALNY Postgres = testujesz u siebie, NIE na produkcji. Produkcja (Supabase)
# to osobne zmienne środowiskowe na serwerze — nigdy tutaj.
#
# Start:   docker compose up -d --build
# Migracje: docker compose exec app php artisan migrate
# Testy:   docker compose exec app php artisan test
# Wejście: http://localhost:8080/api/v1/content/version
# ============================================================================
services:
  # LOKALNY Postgres — OPCJONALNY (offline dev bez dotykania Supabase).
  # Domyślnie NIE startuje. Uruchom go tylko z profilem:  docker compose --profile localdb up -d
  # Wtedy w .env ustaw DB_HOST=db. Do pracy na realnej Supabase zostaw db wyłączone.
  db:
    image: postgres:16-alpine
    profiles: ["localdb"]
    environment:
      POSTGRES_DB: grimshade
      POSTGRES_USER: grimshade
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grimshade -d grimshade"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"   # lokalnie z pest/pint (testy w kontenerze)
    env_file:
      - .env
    volumes:
      - .:/var/www/html          # live-edit kodu
      - vendor:/var/www/html/vendor  # vendor z obrazu (nie chowany przez mount)

  web:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8088}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  dbdata:
  vendor:
